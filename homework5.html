<html>
<head>
    <script type="text/javascript">
        var canvas, context, canX, canY, mouseIsDown = 0;
        var startX, startY = 0;

        function init() {
            canvas = document.getElementById("myCanvas");
            context = canvas.getContext("2d"); 
            canvas.addEventListener("mousedown", mouseDown, false);
            canvas.addEventListener("mousemove", mouseXY, false);
            canvas.addEventListener("mouseup", mouseUp, false);
        }
 
        function mouseUp() {
            mouseIsDown = 0;
            mouseXY();
        }
 
        function mouseDown() {
            if(mouseIsDown == 0){
                startX = canX;
                startY = canY;
            }
            mouseIsDown = 1;
            mouseXY();
        }
 
        function mouseXY(e) {
            if (!e) var e = event;
            canX = e.pageX - canvas.offsetLeft;
            canY = e.pageY - canvas.offsetTop;
            showPos();
        }
 
        function showPos() {
            // large, centered, bright green text
            context.font = "24pt Helvetica";
            context.textAlign = "center";
            context.textBaseline = "middle";
            context.fillStyle = "black";
            var str = canX + ", " + canY;
            if (mouseIsDown) str += " down";
            else str += " up";
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.fillText(str, canvas.width / 2, canvas.height / 2, canvas.width - 10);
            if (mouseIsDown) context.fillStyle = "red";
            else context.fillStyle = "green";
            context.fillRect(canX -5, canY -5, 10, 10);

            if(mouseIsDown){
                context.beginPath();
                context.rect(startX, startY, canX - startX, canY - startY);
                context.lineWidth = 4;
                context.strokeStyle = '#0000ff';
                context.stroke();
            }
        }
    </script>
 
</head>
<body onload="init()">
    <canvas id="myCanvas" height="500" width="500" style="border:1px solid #000000;">
    </canvas>
</body>
</html>
