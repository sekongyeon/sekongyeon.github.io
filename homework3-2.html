<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script>
        let n = 30;
        let arr = [];
        let max = 0;
        let output = "";

        for (let i = 0; i < n; i++) {
        arr[i] = Math.floor(Math.random() * 100) + 1;
        output += arr[i] + (i === n - 1 ? "" : ", ");

        if (max < arr[i]) {
        max = arr[i];
        }
        }

        document.write("<p>Original: " + output + "</p>");
        document.write("<p>Max: " + max + "</p>");

        arr.sort((a, b) => a - b);
        document.write("<p>Sorted: " + arr.join(", ") + "</p>");
    </script>
</body>
</html>
